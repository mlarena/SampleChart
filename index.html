<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D3.js: Мультиосевой график с точками и интерактивом</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #f0f5fa 0%, #e6edf5 100%);
            margin: 0;
            padding: 30px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .dashboard {
            max-width: 1400px;
            width: 100%;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(4px);
            border-radius: 42px;
            padding: 28px 32px;
            box-shadow: 0 25px 50px -12px rgba(0,20,40,0.35);
            border: 1px solid rgba(255,255,255,0.5);
        }
        h2 {
            margin: 0 0 8px 0;
            font-weight: 500;
            color: #0b2b42;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        h2 span {
            background: #1e4b6e;
            color: white;
            padding: 4px 18px;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.3px;
        }
        .stats-panel {
            background: white;
            border-radius: 34px;
            padding: 20px 28px;
            margin: 20px 0 25px 0;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.02), 0 8px 18px rgba(0,40,70,0.1);
            border: 1px solid #dde9f2;
        }
        .stats-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #3d6381;
            margin-bottom: 16px;
            font-weight: 600;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px 24px;
        }
        .stat-card {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            border-bottom: 1px dashed #cbdbe9;
            padding: 8px 0;
        }
        .stat-label {
            color: #1f4462;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            background: #eef4fa;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 1rem;
            color: #003b6f;
        }
        .stat-unit {
            font-size: 0.7rem;
            color: #5c7f9c;
            margin-left: 4px;
            font-weight: 400;
        }
        .chart-wrapper {
            background: #ffffffd9;
            border-radius: 36px;
            padding: 24px 20px 20px 20px;
            box-shadow: 0 8px 22px rgba(0, 30, 60, 0.12);
            backdrop-filter: blur(2px);
            border: 1px solid white;
            position: relative;
        }
        #chart {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            background: #fbfdff;
        }
        .legend-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 22px;
            margin-top: 28px;
            padding: 14px 22px;
            background: #eaf1f9;
            border-radius: 60px;
            justify-content: center;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            background: white;
            padding: 5px 18px 5px 12px;
            border-radius: 40px;
            box-shadow: 0 2px 6px #0000000c;
            border: 1px solid #c9ddef;
            transition: 0.1s;
        }
        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 4px;
        }
        .unit-badge {
            background: #dae6f2;
            border-radius: 30px;
            padding: 2px 8px;
            font-size: 0.7rem;
            font-weight: 700;
            color: #1d496e;
            margin-left: 6px;
        }
        .vertical-line {
            stroke: #2c3e50;
            stroke-width: 2;
            stroke-dasharray: 6,5;
            opacity: 0.5;
            transition: opacity 0.1s;
        }
        .tooltip-point {
            transition: 0.05s;
        }
        .footnote {
            text-align: center;
            margin-top: 22px;
            color: #2b5a7a;
            font-size: 0.9rem;
            font-weight: 400;
        }
    </style>
</head>
<body>
<div class="dashboard">
    <h2>
        ⚡ Мониторинг дорожной станции
        <span>12 параметров · 72 точки</span>
    </h2>

    <!-- DIV над графиком для отображения всех значений в текущей точке (ведомая статистика) -->
    <div class="stats-panel" id="statsPanel">
        <div class="stats-title">📋 Текущие значения (наведите на точку)</div>
        <div class="stats-grid" id="statsGrid">
            <!-- будут заполнены через js -->
        </div>
    </div>

    <div class="chart-wrapper">
        <svg id="chart" width="1200" height="600" viewBox="0 0 1200 600"></svg>
    </div>

    <div id="legendContainer" class="legend-container"></div>
    <div class="footnote">
        ⏱️ 72 временных метки (каждые 20 минут) · Три независимые оси Y · Точки с интерактивом
    </div>
</div>

<script>
(function() {
    // --- МЕТРИКИ (полные, из задания) ---
    const metrics = {
        voltagePower: { name: "Напряжение питания", unit: "В", color: "#d62728", axis: "left" },
        caseTemperature: { name: "Температура внутри корпуса", unit: "°C", color: "#1f77b4", axis: "left" },
        roadTemperature: { name: "Температура дорожного покрытия", unit: "°C", color: "#2ca02c", axis: "left" },
        waterHeight: { name: "Высота слоя воды", unit: "мм", color: "#9467bd", axis: "right" },
        iceHeight: { name: "Высота слоя льда", unit: "мм", color: "#ff7f0e", axis: "right2" },
        snowHeight: { name: "Высота слоя снега", unit: "мм", color: "#ffbb78", axis: "right2" },
        icePercentage: { name: "Процент обледенения", unit: "%", color: "#e377c2", axis: "right" },
        pgmPercentage: { name: "Процент реагента", unit: "%", color: "#17becf", axis: "right" },
        roadStatusCode: { name: "Код состояния дороги", unit: "", color: "#7f7f7f", axis: "right2" },
        roadAngle: { name: "Угол наклона дороги", unit: "°", color: "#bcbd22", axis: "right2" },
        freezeTemperature: { name: "Температура замерзания", unit: "°C", color: "#9edae5", axis: "left" },
        distanceToSurface: { name: "Расстояние до поверхности", unit: "мм", color: "#c5b0d5", axis: "right" }
    };

    // --- УВЕЛИЧЕННЫЙ НАБОР ДАННЫХ: 72 точки (за 24 часа, шаг 20 мин) ---
    const numPoints = 72;
    const timeHours = Array.from({ length: numPoints }, (_, i) => (i * 24) / (numPoints - 1));

    // Генератор с большей вариативностью
    function generateRichSeries(base, amp, cycles = 1.5, noise = 0.5, phase = 0) {
        return timeHours.map((h, idx) => {
            const trend = base 
                + amp * Math.sin((h / 24) * 2 * Math.PI * cycles + phase)
                + 0.4 * amp * Math.sin((h / 8) * 2 * Math.PI);  // высокочастотные колебания
            const randomWalk = (Math.sin(idx * 0.7) * 0.3 + Math.cos(idx * 0.3) * 0.2) * amp;
            return Number((trend + randomWalk + (Math.random() - 0.5) * noise * 0.7).toFixed(2));
        });
    }

    // Создаём массив объектов data
    const data = timeHours.map((hour, i) => ({
        hour: hour,
        voltagePower: generateRichSeries(24.2, 2.8, 1.1, 0.2, 0)[i],
        caseTemperature: generateRichSeries(23.5, 7.5, 1.0, 0.4, 1.2)[i],
        roadTemperature: generateRichSeries(17.8, 11.0, 1.3, 0.7, 2.3)[i],
        waterHeight: generateRichSeries(3.2, 2.8, 2.2, 0.3, 0.8)[i],
        iceHeight: generateRichSeries(0.9, 2.1, 1.7, 0.2, 1.5)[i],
        snowHeight: generateRichSeries(1.5, 4.5, 0.9, 0.5, 3.0)[i],
        icePercentage: generateRichSeries(18.0, 22.0, 1.4, 2.0, 2.2)[i],
        pgmPercentage: generateRichSeries(9.5, 14.0, 1.2, 1.3, 0.5)[i],
        roadStatusCode: Math.floor(Math.abs(generateRichSeries(2.2, 1.8, 0.8, 0.2, 1.1)[i]) % 3) + 1,
        roadAngle: generateRichSeries(1.8, 1.1, 2.0, 0.15, 2.8)[i],
        freezeTemperature: generateRichSeries(-1.8, 3.5, 1.3, 0.4, 2.9)[i],
        distanceToSurface: generateRichSeries(148.0, 25.0, 1.0, 2.2, 1.4)[i]
    }));

    // --- Настройка осей ---
    const margin = { top: 60, right: 150, bottom: 70, left: 80 };
    const width = 1200 - margin.left - margin.right;
    const height = 600 - margin.top - margin.bottom;

    const svg = d3.select("#chart")
        .append("g")
        .attr("transform", `translate(${margin.left},${margin.top})`);

    // X scale
    const xScale = d3.scaleLinear()
        .domain([0, 24])
        .range([0, width]);

    // Левая ось
    const leftKeys = ["voltagePower", "caseTemperature", "roadTemperature", "freezeTemperature"];
    const leftMin = Math.min(0, d3.min(data.flatMap(d => leftKeys.map(k => d[k]))) - 1);
    const leftMax = d3.max(data.flatMap(d => leftKeys.map(k => d[k]))) + 1;
    const yLeft = d3.scaleLinear().domain([leftMin, leftMax]).range([height, 0]);

    // Правая ось 1
    const rightKeys = ["waterHeight", "icePercentage", "pgmPercentage", "distanceToSurface"];
    const rightMin = Math.min(0, d3.min(data.flatMap(d => rightKeys.map(k => d[k]))) - 2);
    const rightMax = d3.max(data.flatMap(d => rightKeys.map(k => d[k]))) + 5;
    const yRight = d3.scaleLinear().domain([rightMin, rightMax]).range([height, 0]);

    // Правая ось 2
    const right2Keys = ["iceHeight", "snowHeight", "roadStatusCode", "roadAngle"];
    const right2Min = Math.min(0, d3.min(data.flatMap(d => right2Keys.map(k => d[k]))) - 1);
    const right2Max = d3.max(data.flatMap(d => right2Keys.map(k => d[k]))) + 2;
    const yRight2 = d3.scaleLinear().domain([right2Min, right2Max]).range([height, 0]);

    // --- Сетка ---
    svg.append("g")
        .attr("class", "grid")
        .attr("transform", `translate(0,0)`)
        .call(d3.axisLeft(yLeft).ticks(6).tickSize(-width).tickFormat(""))
        .style("stroke", "#cbdae8")
        .style("stroke-dasharray", "4 4")
        .style("opacity", 0.5);

    // --- Оси Y ---
    svg.append("g")
        .attr("class", "axis-left")
        .call(d3.axisLeft(yLeft).ticks(8))
        .style("font-size", "11px")
        .append("text")
        .attr("transform", "rotate(-90)")
        .attr("y", -55)
        .attr("x", -height/2)
        .style("fill", "#1f4b74")
        .style("font-weight", "600")
        .text("Левая ось (В / °C)");

    svg.append("g")
        .attr("class", "axis-right")
        .attr("transform", `translate(${width}, 0)`)
        .call(d3.axisRight(yRight).ticks(6))
        .style("font-size", "11px")
        .append("text")
        .attr("transform", "rotate(-90)")
        .attr("y", 50)
        .attr("x", -height/2)
        .style("fill", "#9467bd")
        .style("font-weight", "600")
        .text("Правая ось 1 (мм / %)");

    svg.append("g")
        .attr("class", "axis-right2")
        .attr("transform", `translate(${width + 70}, 0)`)
        .call(d3.axisRight(yRight2).ticks(6))
        .style("font-size", "11px")
        .append("text")
        .attr("transform", "rotate(-90)")
        .attr("y", 50)
        .attr("x", -height/2)
        .style("fill", "#ff7f0e")
        .style("font-weight", "600")
        .text("Правая ось 2 (мм / код / °)");

    // Ось X
    svg.append("g")
        .attr("transform", `translate(0, ${height})`)
        .call(d3.axisBottom(xScale).ticks(12).tickFormat(d => d + "ч"))
        .style("font-size", "12px");

    // --- Линии (полупроzрачные, чтобы точки выделялись) ---
    Object.keys(metrics).forEach(key => {
        const m = metrics[key];
        let scale = m.axis === 'left' ? yLeft : (m.axis === 'right' ? yRight : yRight2);
        svg.append("path")
            .datum(data.map(d => ({ hour: d.hour, value: d[key] })))
            .attr("fill", "none")
            .attr("stroke", m.color)
            .attr("stroke-width", 1.8)
            .attr("opacity", 0.7)
            .attr("d", d3.line()
                .x(d => xScale(d.hour))
                .y(d => scale(d.value))
                .curve(d3.curveMonotoneX)
            );
    });

    // --- ВЕРТИКАЛЬНАЯ ЛИНИЯ (следователь за мышью) ---
    const verticalLine = svg.append("line")
        .attr("class", "vertical-line")
        .attr("y1", 0)
        .attr("y2", height)
        .attr("x1", -10)  // начально спрятана
        .attr("x2", -10)
        .style("stroke", "#1d3557")
        .style("stroke-width", 2)
        .style("stroke-dasharray", "5,4")
        .style("opacity", 0);

    // --- Контейнер для точек (будем добавлять по одной) ---
    // Но сначала создадим группу для каждой метрики, чтобы повесить точки
    Object.keys(metrics).forEach(key => {
        const m = metrics[key];
        const scale = m.axis === 'left' ? yLeft : (m.axis === 'right' ? yRight : yRight2);
        const group = svg.append("g").attr("class", `points-${key}`);

        group.selectAll(`circle-${key}`)
            .data(data)
            .enter()
            .append("circle")
            .attr("cx", d => xScale(d.hour))
            .attr("cy", d => scale(d[key]))
            .attr("r", 4.5)
            .attr("fill", m.color)
            .attr("stroke", "white")
            .attr("stroke-width", 1.5)
            .attr("opacity", 0.85)
            .attr("data-metric", key)
            .attr("data-hour", d => d.hour)
            .style("cursor", "pointer")
            .on("mouseenter", function(event, d) {
                // Выделяем точку
                d3.select(this).attr("r", 7).attr("stroke-width", 2.5).attr("opacity", 1);
                // Обновляем верхнюю панель со всеми значениями
                updateStatsPanel(d);
                // Показываем и перемещаем вертикальную линию
                verticalLine
                    .attr("x1", xScale(d.hour))
                    .attr("x2", xScale(d.hour))
                    .style("opacity", 1);
            })
            .on("mouseleave", function() {
                d3.select(this).attr("r", 4.5).attr("stroke-width", 1.5).attr("opacity", 0.85);
                // Не убираем линию сразу, чтобы было плавно — но по условию при выходе с точки убираем
                verticalLine.style("opacity", 0);
                // Можно очистить панель или показать значения по умолчанию (первые)
                // Покажем первые данные как "по умолчанию"
                updateStatsPanel(data[0]);
            });
    });

    // Функция обновления верхнего div со всеми показателями
    function updateStatsPanel(pointData) {
        if (!pointData) return;
        const grid = d3.select("#statsGrid");
        grid.html(""); // очищаем
        Object.keys(metrics).forEach(key => {
            const m = metrics[key];
            const value = pointData[key];
            const formatted = typeof value === 'number' ? value.toFixed(2) : value;
            const card = grid.append("div").attr("class", "stat-card");
            card.append("span").attr("class", "stat-label").html(`${m.name}  <span class="stat-unit">${m.unit}</span>`);
            card.append("span").attr("class", "stat-value").text(formatted);
        });
    }

    // Инициализируем панель первым элементом (чаще всего 0-й час)
    updateStatsPanel(data[0]);

    // --- Легенда ---
    const legendDiv = d3.select("#legendContainer");
    Object.keys(metrics).forEach(key => {
        const m = metrics[key];
        const item = legendDiv.append("div").attr("class", "legend-item");
        item.append("span").attr("class", "legend-color").style("background", m.color);
        item.append("span").text(m.name);
        item.append("span").attr("class", "unit-badge").text(m.unit || '—');
    });

    // Чтобы линия появлялась не только при наведении на точку, но и отслеживала мышь на фоне (опционально)
    // Добавим прозрачный прямоугольник для отслеживания движения мыши, но без вызова всплывашек,
    // чтобы вертикальная линия двигалась и можно было смотреть значения в панели.
    // Это удобно: линия следует за мышью, а панель обновляется по ближайшей точке.
    // Не конфликтует с точками, так как точки выше по z (они перекрывают).
    
    svg.append("rect")
        .attr("width", width)
        .attr("height", height)
        .style("fill", "none")
        .style("pointer-events", "all")
        .on("mousemove", function(event) {
            const [xCoord] = d3.pointer(event);
            const mouseHour = xScale.invert(xCoord);
            // Находим ближайший объект в data
            const closest = data.reduce((prev, curr) => 
                Math.abs(curr.hour - mouseHour) < Math.abs(prev.hour - mouseHour) ? curr : prev
            );
            verticalLine
                .attr("x1", xScale(closest.hour))
                .attr("x2", xScale(closest.hour))
                .style("opacity", 1);
            updateStatsPanel(closest);
        })
        .on("mouseleave", function() {
            verticalLine.style("opacity", 0);
            // можно вернуть на первые данные или оставить последние - оставим последние
            // но для эстетики покажем первый час
            updateStatsPanel(data[0]);
        });

})();
</script>

</body>
</html>
