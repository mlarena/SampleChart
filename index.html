<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D3.js: Мультиосевой график с точками и интерактивом</title>
    <!-- Подключение CSS -->
    <link rel="stylesheet" href="styles.css">
    <!-- Подключение D3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
<div class="dashboard">
    <h2>
        ⚡ Мониторинг дорожной станции
        <span>12 параметров · 72 точки</span>
    </h2>

    <!-- DIV над графиком для отображения всех значений в текущей точке -->
    <div class="stats-panel" id="statsPanel">
        <div class="stats-title">📋 Текущие значения (наведите на точку)</div>
        <div class="stats-grid" id="statsGrid">
            <!-- будут заполнены через js -->
        </div>
    </div>

    <div class="chart-wrapper">
        <svg id="chart" width="1200" height="600" viewBox="0 0 1200 600"></svg>
    </div>

    <div id="legendContainer" class="legend-container"></div>
    <div class="footnote">
        ⏱️ 72 временных метки (каждые 20 минут) · Три независимые оси Y · Точки с интерактивом
    </div>
</div>

<!-- Подключение JavaScript модулей -->
<script src="data.js"></script>
<script src="chart.js"></script>
</body>
</html>
